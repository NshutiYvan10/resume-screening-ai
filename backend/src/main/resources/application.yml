spring:
  application:
    name: resume-screening-backend

  # Loads application-local.yml (gitignored) for local dev credentials by default.
  # Override with SPRING_PROFILES_ACTIVE (e.g. =prod) in other environments.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resume_screening}
    username: ${DB_USERNAME:${USER}}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    # HS256 signing key - MUST be overridden in production (min 32 bytes)
    secret: ${JWT_SECRET:dev-secret-key-change-me-in-production-0123456789abcdef}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}

  cors:
    # includes IPv6 loopback: modern Node/Vite may bind [::1] for "localhost"
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:4173,http://[::1]:5173,http://127.0.0.1:5173}

  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

  storage:
    root: ${STORAGE_ROOT:./storage}

  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8001}
    api-key: ${AI_SERVICE_API_KEY:change-me-internal-key}

  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:no-reply@resumeai.local}
    from-name: ${MAIL_FROM_NAME:ResumeAI Screening}

  seed:
    admin-email: ${SEED_ADMIN_EMAIL:admin@resumeai.local}
    admin-password: ${SEED_ADMIN_PASSWORD:Admin@12345}
    admin-name: ${SEED_ADMIN_NAME:Platform Administrator}

  invitations:
    expiry-hours: 72

logging:
  level:
    com.resumeai: INFO
